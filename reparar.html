<!DOCTYPE html>
<html>
<head>
    <title>Reparando Voxi...</title>
    <style>
        body { background: #b71c1c; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { background: white; color: black; padding: 20px; border-radius: 10px; display: inline-block; }
        button { background: #444; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </script>
</head>
<body>
    <div class="box">
        <h1>REPARACIÓN NUCLEAR</h1>
        <p>Se borrará la caché forzadamente y se reinstalará la versión estable.</p>
        <button onclick="nuclear()">PRESIONAR PARA REPARAR AHORA</button>
        <p id="status"></p>
    </div>

    <script>
    async function nuclear() {
        document.getElementById('status').innerText = "Limpiando...";
        
        // 1. Unregister all service workers
        if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            for(let r of regs) await r.unregister();
        }

        // 2. Clear all caches
        if ('caches' in window) {
            const names = await caches.keys();
            for (let n of names) await caches.delete(n);
        }

        // 3. Clear LocalStorage and SessionStorage
        localStorage.clear();
        sessionStorage.clear();

        document.getElementById('status').innerText = "Listo. Redirigiendo...";
        
        // 4. Force reload from server bypassing cache
        setTimeout(() => {
            window.location.href = "index.html?v=" + Date.now();
        }, 1000);
    }
    </script>
</body>
</html>
