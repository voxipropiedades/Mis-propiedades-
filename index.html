<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxi CRM - Inmobiliaria Pro</title>
    <!-- Tailwind CSS para diseño profesional -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <!-- jsPDF & html2canvas for reports -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .card-hover:hover { transform: translateY(-2px); transition: all 0.2s; }
    </style>
</head>
<body class="pb-20">

    <!-- Header -->
    <header class="bg-[#b71c1c] text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white p-2 rounded-lg">
                    <img src="https://cdn-icons-png.flaticon.com/512/602/602280.png" class="h-8" alt="Logo">
                </div>
                <div>
                    <h1 class="text-xl font-bold leading-tight">Voxi CRM</h1>
                    <p class="text-xs opacity-80">Gestión de Propiedades & Cierres</p>
                </div>
            </div>
            <div id="sync-status" class="flex items-center gap-2 text-xs bg-black/20 px-3 py-1 rounded-full">
                <span class="h-2 w-2 rounded-full bg-yellow-400 animate-pulse"></span>
                Sincronizando...
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="container mx-auto p-4 max-w-4xl">
        
        <!-- Tablero / Diagrama -->
        <section id="tablero" class="tab-content active space-y-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500 card-hover">
                    <p class="text-xs text-gray-500 uppercase font-bold">Inventario</p>
                    <h3 id="stat-props" class="text-2xl font-bold">0</h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500 card-hover">
                    <p class="text-xs text-gray-500 uppercase font-bold">Prospectos</p>
                    <h3 id="stat-prospects" class="text-2xl font-bold">0</h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500 card-hover">
                    <p class="text-xs text-gray-500 uppercase font-bold">Meta 2 Sem</p>
                    <h3 id="stat-urgent" class="text-2xl font-bold text-red-600">0</h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-500 card-hover">
                    <p class="text-xs text-gray-500 uppercase font-bold">Comisiones</p>
                    <h3 id="stat-money" class="text-2xl font-bold">$0</h3>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-chart-line text-blue-600"></i> Diagrama de Control
                </h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-50 text-gray-600">
                            <tr>
                                <th class="p-3 font-semibold">Propiedad</th>
                                <th class="p-3 font-semibold">Cliente</th>
                                <th class="p-3 font-semibold">Estado</th>
                                <th class="p-3 font-semibold">Ganancia</th>
                            </tr>
                        </thead>
                        <tbody id="diagrama-list">
                            <!-- Inyectado por JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Inventario -->
        <section id="inventario" class="tab-content space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">Mis Propiedades</h2>
                <button onclick="openModal('prop-modal')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md">
                    <i class="fas fa-plus mr-1"></i> Nueva
                </button>
            </div>
            <div id="props-list" class="grid gap-4">
                <!-- Inyectado por JS -->
            </div>
        </section>

        <!-- Prospectos -->
        <section id="prospectos" class="tab-content space-y-4">
            <h2 class="text-xl font-bold">Seguimiento de Prospectos</h2>
            <div id="prospects-list" class="space-y-3">
                <!-- Inyectado por JS -->
            </div>
        </section>

    </main>

    <!-- Floating Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-2 flex justify-around items-center shadow-2xl z-40">
        <button onclick="switchTab('tablero')" class="flex flex-col items-center p-2 text-gray-500 nav-btn" data-tab="tablero">
            <i class="fas fa-th-large text-xl"></i>
            <span class="text-[10px] font-bold mt-1">INICIO</span>
        </button>
        <button onclick="switchTab('inventario')" class="flex flex-col items-center p-2 text-gray-500 nav-btn" data-tab="inventario">
            <i class="fas fa-house-user text-xl"></i>
            <span class="text-[10px] font-bold mt-1">INVENTARIO</span>
        </button>
        <button onclick="switchTab('prospectos')" class="flex flex-col items-center p-2 text-gray-500 nav-btn" data-tab="prospectos">
            <i class="fas fa-users text-xl"></i>
            <span class="text-[10px] font-bold mt-1">PROSPECTOS</span>
        </button>
        <button onclick="saveAll(true)" class="flex flex-col items-center p-3 bg-[#b71c1c] text-white rounded-2xl shadow-xl -mt-8 border-4 border-white">
            <i class="fas fa-cloud-upload-alt text-2xl"></i>
            <span class="text-[10px] font-bold mt-1">GUARDAR</span>
        </button>
    </nav>

    <!-- Modales, Scripts, etc. -->
    <div id="prop-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-[60] backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-2xl p-6 overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-bold mb-4">Nueva Propiedad</h2>
            <form id="prop-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">NOMBRE / TÍTULO</label>
                    <input type="text" name="titulo" class="w-full border rounded-lg p-2 text-sm" placeholder="Ej: Casa en Acayuca 150m2" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">PRECIO LISTA</label>
                        <input type="number" name="precio_lista" class="w-full border rounded-lg p-2 text-sm" placeholder="700000">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">GANANCIA</label>
                        <input type="number" name="ganancia" class="w-full border rounded-lg p-2 text-sm" placeholder="150000">
                    </div>
                </div>
                <div class="flex gap-4">
                    <button type="button" onclick="closeModal('prop-modal')" class="flex-1 bg-gray-100 text-gray-600 font-bold py-2 rounded-lg">Cancelar</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white font-bold py-2 rounded-lg">Guardar Propiedad</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBto16XfwgU2DW4f0M7wvjdZZKfy1_wY",
            authDomain: "voxiapp-6672e.firebaseapp.com",
            projectId: "voxiapp-6672e",
            storageBucket: "voxiapp-6672e.firebasestorage.app",
            messagingSenderId: "332968241548",
            appId: "1:332968241548:web:7f35ebe2cd2443fb0732"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const SYNC_ID = "voxi_main_db";

        // DATA STORE
        let appData = {
            properties: [],
            prospects: [
                { id: 1, name: "Prospecto 1", status: "Esperando dinero", urgent: true },
                { id: 2, name: "Prospecto 2", status: "Vacaciones", urgent: false },
                { id: 3, name: "Prospecto 3", status: "Revisando", urgent: false },
                { id: 4, name: "Prospecto 4", status: "Seguimiento", urgent: true },
                { id: 5, name: "Prospecto 5", status: "Interesado", urgent: true }
            ],
            settings: { lastSync: null }
        };

        // UI FUNCTIONS
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => {
                if(b.dataset.tab === tabId) {
                    b.classList.add('text-[#b71c1c]');
                    b.classList.remove('text-gray-500');
                } else {
                    b.classList.remove('text-[#b71c1c]');
                    b.classList.add('text-gray-500');
                }
            });
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // CORE LOGIC: GUARDADO REAL
        async function saveAll(showMsg = false) {
            const status = document.getElementById('sync-status');
            status.innerHTML = `<span class="h-2 w-2 rounded-full bg-blue-400 animate-spin"></span> Guardando...`;
            status.classList.remove('bg-black/20', 'bg-green-600', 'bg-red-600');
            status.classList.add('bg-blue-600');

            try {
                // 1. LocalStorage
                localStorage.setItem('voxi_local_v1', JSON.stringify(appData));
                
                // 2. Firestore (Nube)
                await db.collection("data").doc(SYNC_ID).set({
                    ...appData,
                    lastUpdate: new Date().toISOString()
                });

                status.innerHTML = `<span class="h-2 w-2 rounded-full bg-green-400"></span> Nube Actualizada`;
                status.classList.replace('bg-blue-600', 'bg-green-600');
                if(showMsg) alert("✅ INFORMACIÓN GUARDADA EN LA NUBE CORRECTAMENTE.\n\nSe ha verificado el guardado en Firestore.");
                
                renderAll();
            } catch (error) {
                console.error("Error al guardar:", error);
                status.innerHTML = `<span class="h-2 w-2 rounded-full bg-white"></span> Error de Conexión`;
                status.classList.replace('bg-blue-600', 'bg-red-600');
                if(showMsg) alert("❌ ERROR AL GUARDAR EN LA NUBE.\nVerifica tu conexión a internet.");
            }
        }

        async function loadAll() {
            const status = document.getElementById('sync-status');
            
            // Intenta cargar de la nube primero
            try {
                const doc = await db.collection("data").doc(SYNC_ID).get();
                if(doc.exists) {
                    appData = doc.data();
                    console.log("Cargado desde Nube");
                    status.innerHTML = `<span class="h-2 w-2 rounded-full bg-green-400"></span> Datos en Línea`;
                    status.classList.add('bg-green-600');
                } else {
                    // Si no hay en nube, carga local
                    const local = localStorage.getItem('voxi_local_v1');
                    if(local) appData = JSON.parse(local);
                    status.innerHTML = `<span class="h-2 w-2 rounded-full bg-yellow-400"></span> Modo Local`;
                }
            } catch (e) {
                const local = localStorage.getItem('voxi_local_v1');
                if(local) appData = JSON.parse(local);
                status.innerHTML = `<span class="h-2 w-2 rounded-full bg-red-400"></span> Sin Conexión`;
            }
            renderAll();
        }

        function renderAll() {
            // Stats
            document.getElementById('stat-props').innerText = appData.properties.length;
            document.getElementById('stat-prospects').innerText = appData.prospects.length;
            document.getElementById('stat-urgent').innerText = appData.prospects.filter(p => p.urgent).length;
            
            const totalProfit = appData.properties.reduce((sum, p) => sum + (parseFloat(p.ganancia) || 0), 0);
            document.getElementById('stat-money').innerText = `$${totalProfit.toLocaleString()}`;

            // Inventario
            const propsList = document.getElementById('props-list');
            propsList.innerHTML = appData.properties.length ? '' : `<div class="text-center p-8 text-gray-400 border-2 border-dashed rounded-xl">No hay propiedades. Pulsa "Nueva" para empezar.</div>`;
            appData.properties.forEach((p, idx) => {
                propsList.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center">
                        <div>
                            <h4 class="font-bold text-gray-800">${p.titulo}</h4>
                            <p class="text-xs text-gray-500">$${parseFloat(p.precio_lista).toLocaleString()} - Ganancia: $${parseFloat(p.ganancia).toLocaleString()}</p>
                        </div>
                        <button onclick="deleteProp(${idx})" class="text-red-400 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });

            // Diagrama
            const diagramList = document.getElementById('diagrama-list');
            diagramList.innerHTML = '';
            appData.properties.forEach(p => {
                diagramList.innerHTML += `
                    <tr class="border-b border-gray-50">
                        <td class="p-3 font-semibold">${p.titulo}</td>
                        <td class="p-3 text-gray-500">Pendiente</td>
                        <td class="p-3"><span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-[10px] font-bold">DISPONIBLE</span></td>
                        <td class="p-3 font-bold text-green-600">$${parseFloat(p.ganancia).toLocaleString()}</td>
                    </tr>
                `;
            });

            // Prospectos
            const prospectsList = document.getElementById('prospects-list');
            prospectsList.innerHTML = '';
            appData.prospects.forEach(p => {
                prospectsList.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 ${p.urgent ? 'border-red-500' : 'border-gray-300'} flex justify-between items-center">
                        <div>
                            <h4 class="font-bold">${p.name}</h4>
                            <p class="text-xs text-gray-500">${p.status}</p>
                        </div>
                        <div class="flex gap-2">
                            <button class="bg-green-500 text-white p-2 rounded-lg text-xs"><i class="fab fa-whatsapp"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        // Form Handling
        document.getElementById('prop-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            appData.properties.push({
                titulo: formData.get('titulo'),
                precio_lista: formData.get('precio_lista'),
                ganancia: formData.get('ganancia'),
                id: Date.now()
            });
            closeModal('prop-modal');
            e.target.reset();
            saveAll();
        });

        function deleteProp(idx) {
            if(confirm("¿Eliminar esta propiedad?")) {
                appData.properties.splice(idx, 1);
                saveAll();
            }
        }

        // INIT
        window.onload = loadAll;
    </script>
</body>
</html>
