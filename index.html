<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxi Propiedades V4 - Gestión Elite</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #004aad;
            --secondary: #00c4cc;
            --accent: #ffde59;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #333;
            --success: #28a745;
            --danger: #dc3545;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .container { max-width: 900px; margin: auto; padding: 15px; }

        .section-card {
            background: var(--white);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 { border-left: 5px solid var(--secondary); padding-left: 10px; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-success { background: var(--success); }
        .btn-add { background: var(--secondary); margin-bottom: 10px; }

        .card {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.75em;
            font-weight: bold;
            color: white;
            background: var(--secondary);
        }

        .price-tag { color: var(--success); font-weight: bold; font-size: 1.1em; }
        .profit-tag { color: var(--primary); font-weight: bold; background: #eef4ff; padding: 5px; border-radius: 5px; }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            color: var(--danger);
            cursor: pointer;
        }

        .fixed-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 15px;
            display: flex;
            justify-content: center;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .tab-content { display: none; }
        .active-tab { display: block; }

        .tabs-nav {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            margin-bottom: 20px;
            padding: 5px;
        }
        .tab-btn {
            background: #eee;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
        }
        .tab-btn.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

<header>
    <h1>VOXI ELITE V4</h1>
    <p>Control Total de Propiedades y Cierres</p>
</header>

<div class="container">
    <div class="tabs-nav">
        <button class="tab-btn active" onclick="showTab('inventario')">🏠 Inventario</button>
        <button class="tab-btn" onclick="showTab('prospectos')">👥 Prospectos</button>
        <button class="tab-btn" onclick="showTab('legal')">📜 Contratos</button>
        <button class="tab-btn" onclick="showTab('estrategia')">💡 Mi Estrategia</button>
    </div>

    <!-- SECCIÓN INVENTARIO -->
    <div id="inventario" class="tab-content active-tab">
        <div class="section-card">
            <h2><i class="fas fa-home"></i> Casas y Terrenos</h2>
            <button class="btn btn-add" onclick="addProperty()"><i class="fas fa-plus"></i> Nueva Propiedad</button>
            <div id="propertyList"></div>
        </div>
    </div>

    <!-- SECCIÓN PROSPECTOS -->
    <div id="prospectos" class="tab-content">
        <div class="section-card">
            <h2><i class="fas fa-users"></i> Seguimiento de Prospectos</h2>
            <button class="btn btn-add" onclick="addProspect()"><i class="fas fa-plus"></i> Nuevo Prospecto</button>
            <div id="prospectList"></div>
        </div>
    </div>

    <!-- SECCIÓN LEGAL -->
    <div id="legal" class="tab-content">
        <div class="section-card">
            <h2><i class="fas fa-file-contract"></i> Gestión de Contratos</h2>
            <textarea id="contratosNote" placeholder="Anota aquí el estado de las escrituras, pagos pendientes de terrenos, y trámites Fovissste/Issfam..." rows="10"></textarea>
        </div>
    </div>

    <!-- SECCIÓN ESTRATEGIA -->
    <div id="estrategia" class="tab-content">
        <div class="section-card">
            <h2><i class="fas fa-lightbulb"></i> Propuestas de Zapia</h2>
            <div id="strategyContent" style="background: #fff9db; padding: 15px; border-radius: 10px; border: 1px dashed #fab005;">
                Aquí pegaremos los guiones de venta y estrategias de cierre que vayamos armando.
            </div>
            <textarea id="myNotes" placeholder="Mis propias notas de cierre..." rows="5" style="margin-top:15px;"></textarea>
        </div>
    </div>
</div>

<div class="fixed-footer">
    <button class="btn btn-success" onclick="saveAll()"><i class="fas fa-save"></i> GUARDAR TODO</button>
</div>

<script>
    let appData = {
        properties: [],
        prospects: [],
        legal: "",
        notes: ""
    };

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active-tab');
        event.target.classList.add('active');
    }

    function addProperty() {
        appData.properties.push({
            id: Date.now(),
            tipo: 'Casa',
            condicion: 'Preventa',
            titulo: '',
            ubicacion: '',
            precio: '',
            contado: '',
            ganancia: '',
            pago: 'Contado',
            fotos: '',
            medidas: ''
        });
        renderProperties();
    }

    function renderProperties() {
        const list = document.getElementById('propertyList');
        list.innerHTML = '';
        appData.properties.forEach((p, index) => {
            list.innerHTML += `
                <div class="card">
                    <span class="delete-btn" onclick="deleteItem('properties', ${index})"><i class="fas fa-trash"></i></span>
                    <div class="grid">
                        <div class="input-group">
                            <label>Tipo</label>
                            <select onchange="updateProp(${index}, 'tipo', this.value)">
                                <option value="Casa" ${p.tipo === 'Casa' ? 'selected' : ''}>Casa</option>
                                <option value="Terreno" ${p.tipo === 'Terreno' ? 'selected' : ''}>Terreno</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Estado</label>
                            <select onchange="updateProp(${index}, 'condicion', this.value)">
                                <option value="Preventa" ${p.condicion === 'Preventa' ? 'selected' : ''}>Preventa</option>
                                <option value="Nueva" ${p.condicion === 'Nueva' ? 'selected' : ''}>Nueva</option>
                                <option value="Usada" ${p.condicion === 'Usada' ? 'selected' : ''}>Usada</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Título / Nombre</label>
                        <input type="text" value="${p.titulo}" oninput="updateProp(${index}, 'titulo', this.value)" placeholder="Ej: Casa 107m2 Acayuca">
                    </div>
                    <div class="input-group">
                        <label>Ubicación (o link Maps)</label>
                        <input type="text" value="${p.ubicacion}" oninput="updateProp(${index}, 'ubicacion', this.value)">
                    </div>
                    <div class="grid">
                        <div class="input-group"><label>Precio Lista</label><input type="text" value="${p.precio}" oninput="updateProp(${index}, 'precio', this.value)"></div>
                        <div class="input-group"><label>Precio Efectivo</label><input type="text" value="${p.contado}" oninput="updateProp(${index}, 'contado', this.value)"></div>
                    </div>
                    <div class="grid">
                        <div class="input-group"><label>GANANCIA $</label><input type="text" class="profit-tag" value="${p.ganancia}" oninput="updateProp(${index}, 'ganancia', this.value)"></div>
                        <div class="input-group">
                            <label>Forma de Pago</label>
                            <select onchange="updateProp(${index}, 'pago', this.value)">
                                <option value="Contado" ${p.pago === 'Contado' ? 'selected' : ''}>Efectivo / Contado</option>
                                <option value="Credito" ${p.pago === 'Credito' ? 'selected' : ''}>Fovissste / Issfam</option>
                                <option value="Mixto" ${p.pago === 'Mixto' ? 'selected' : ''}>Mixto</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Link a Fotos (Drive/WhatsApp)</label>
                        <input type="text" value="${p.fotos}" oninput="updateProp(${index}, 'fotos', this.value)" placeholder="https://...">
                    </div>
                </div>
            `;
        });
    }

    function addProspect() {
        appData.prospects.push({ nombre: '', interes: '', estado: '', fecha: '' });
        renderProspects();
    }

    function renderProspects() {
        const list = document.getElementById('prospectList');
        list.innerHTML = '';
        appData.prospects.forEach((p, index) => {
            list.innerHTML += `
                <div class="card">
                    <span class="delete-btn" onclick="deleteItem('prospects', ${index})"><i class="fas fa-trash"></i></span>
                    <input type="text" placeholder="Nombre del Cliente" value="${p.nombre}" oninput="updatePros(${index}, 'nombre', this.value)" style="font-weight:bold; margin-bottom:10px;">
                    <div class="grid">
                        <input type="text" placeholder="Propiedad de Interés" value="${p.interes}" oninput="updatePros(${index}, 'interes', this.value)">
                        <input type="text" placeholder="Estado (ej: Esperando dinero)" value="${p.estado}" oninput="updatePros(${index}, 'estado', this.value)">
                    </div>
                </div>
            `;
        });
    }

    function updateProp(i, key, val) { appData.properties[i][key] = val; }
    function updatePros(i, key, val) { appData.prospects[i][key] = val; }

    function deleteItem(type, index) {
        if(confirm('¿Borrar este elemento?')) {
            appData[type].splice(index, 1);
            type === 'properties' ? renderProperties() : renderProspects();
        }
    }

    function saveAll() {
        appData.legal = document.getElementById('contratosNote').value;
        appData.notes = document.getElementById('myNotes').value;
        localStorage.setItem('voxi_data_v4', JSON.stringify(appData));
        alert('✅ ¡Información guardada con éxito en tu dispositivo!');
    }

    function loadAll() {
        const saved = localStorage.getItem('voxi_data_v4');
        if(saved) {
            appData = JSON.parse(saved);
            renderProperties();
            renderProspects();
            document.getElementById('contratosNote').value = appData.legal || '';
            document.getElementById('myNotes').value = appData.notes || '';
        }
    }

    window.onload = loadAll;
</script>

</body>
</html>
